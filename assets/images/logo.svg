<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="circleGrad" x1="16" y1="104" x2="80" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="29" y1="80" x2="89" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="33%" stop-color="#06b6d4"/>
      <stop offset="66%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.15"/>
    </filter>

    <mask id="cutout">
      <rect x="0" y="0" width="120" height="120" fill="white" />
      <path d="M 29 80 L 49 50 L 69 65 L 89 25" stroke="black" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" />
    </mask>
  </defs>

  <!-- Background Bar Chart -->
  <g opacity="0.25">
    <rect x="24" y="80" width="10" height="20" rx="3" fill="#2563eb" />
    <rect x="44" y="50" width="10" height="50" rx="3" fill="#06b6d4" />
    <rect x="64" y="65" width="10" height="35" rx="3" fill="#8b5cf6" />
    <rect x="84" y="25" width="10" height="75" rx="3" fill="#f97316" />
  </g>

  <!-- Ground Line for Bar Chart to give it a solid base -->
  <line x1="20" y1="100" x2="100" y2="100" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0.4" />

  <!-- Zero Circle -->
  <circle cx="46" cy="74" r="28" stroke="url(#circleGrad)" stroke-width="14" mask="url(#cutout)" />

  <!-- Trending Line Chart & Nodes -->
  <g filter="url(#shadow)">
    <!-- Line Chart Path -->
    <path d="M 29 80 L 49 50 L 69 65 L 89 25" stroke="url(#lineGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Data Nodes -->
    <circle cx="29" cy="80" r="4.5" fill="#FFFFFF" stroke="url(#lineGrad)" stroke-width="2.5" />
    <circle cx="49" cy="50" r="4.5" fill="#FFFFFF" stroke="url(#lineGrad)" stroke-width="2.5" />
    <circle cx="69" cy="65" r="4.5" fill="#FFFFFF" stroke="url(#lineGrad)" stroke-width="2.5" />
    <!-- Final node has a bigger pop to show the DA goal -->
    <circle cx="89" cy="25" r="6" fill="#FFFFFF" stroke="url(#lineGrad)" stroke-width="3" />
    <circle cx="89" cy="25" r="2.5" fill="#f97316" />
  </g>

  <!-- Decorative Analytics Elements -->
  <circle cx="18" cy="30" r="3" fill="#8b5cf6" opacity="0.6" />
  <circle cx="95" cy="85" r="4" fill="#2563eb" opacity="0.4" />
  <circle cx="102" cy="45" r="2" fill="#f97316" opacity="0.7" />
  <circle cx="24" cy="106" r="2.5" fill="#06b6d4" opacity="0.5" />
  
  <path d="M 80 80 L 84 80 M 82 78 L 82 82" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <path d="M 28 45 L 32 45 M 30 43 L 30 47" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
</svg>
